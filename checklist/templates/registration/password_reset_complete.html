{% extends "checklist/base.html" %}
{% block title %}Password changed · fly.vdwaal.net{% endblock %}

{% block content %}
<div class="auth-shell">

    <div class="proc-header">
        <div class="proc-phase">Account</div>
        <h1 class="proc-title">Password changed</h1>
    </div>

    <div class="auth-card">
        <div class="auth-card-section">
            <p class="auth-notice">Your password has been set. You can now sign in with your new password.</p>
            <a class="auth-btn" href="{% url 'login' %}">Sign in</a>
        </div>
    </div>

</div>
{% endblock %}
